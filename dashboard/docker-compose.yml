# SPDX-License-Identifier: MIT
services:
  dashboard:
    build: .
    ports:
      - "127.0.0.1:8080:8080"   # bind to localhost; expose via reverse proxy/VPN
    volumes:
      # File collectors write here (collect.sh); the dashboard only reads it
      # and imports new results into its database. Override per environment:
      #   DASHBOARD_DATA=$HOME/dashdata docker compose up -d
      - ${DASHBOARD_DATA:-/var/lib/devops-dashboard}:/data:ro
      # Result history lives in SQLite on a named volume.
      - dashboard-db:/db
    environment:
      # Per-host bearer tokens for the HTTP ingest API, e.g.
      #   DASHBOARD_TOKENS="web1:s3cret,db1:0th3r"  ("*" = any host)
      # Leave unset to keep ingest disabled.
      - DASHBOARD_TOKENS=${DASHBOARD_TOKENS:-}
    restart: unless-stopped

volumes:
  dashboard-db:
