name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: |
          bash -n docker-cleanup/docker-cleanup.sh
          bash -n dotfiles-bootstrap/bootstrap.sh
          bash -n dashboard/collect.sh
      - name: shellcheck
        run: shellcheck docker-cleanup/docker-cleanup.sh dotfiles-bootstrap/bootstrap.sh dashboard/collect.sh

  python:
    name: Python lint + tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: ruff
        uses: astral-sh/ruff-action@v3
      - name: Unit tests
        run: python -m unittest discover -s tests -v

  dashboard:
    name: Dashboard (tests + image build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dashboard dependencies
        run: pip install -r dashboard/requirements.txt httpx
      - name: Run tests (including the FastAPI app tests)
        run: python -m unittest tests.test_dashboard_store tests.test_dashboard_db tests.test_dashboard_notify tests.test_dashboard_app -v
      - name: Build Docker image
        run: docker build -t devops-dashboard dashboard/
      - name: Smoke test the container (file import + HTTP ingest)
        run: |
          mkdir -p /tmp/dashdata/ci-host/sys-triage
          echo '{"summary": {"high": 0, "medium": 1, "low": 2}}' \
            > /tmp/dashdata/ci-host/sys-triage/20260707-120000.json
          docker run -d --name dash -p 8080:8080 \
            -e DASHBOARD_TOKENS="ci-remote:smoke-token" \
            -v /tmp/dashdata:/data:ro devops-dashboard
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8080/healthz && break
            sleep 1
          done
          # file-collector result was imported
          curl -sf http://127.0.0.1:8080/ | grep -q "ci-host"
          # ingest API: wrong token rejected, right token stores
          ! curl -sf -X POST -H "Authorization: Bearer wrong" \
              -H "Content-Type: application/json" -d '{"summary":{"high":0,"medium":0,"low":0}}' \
              http://127.0.0.1:8080/api/v1/ingest/ci-remote/host-hardening-check
          curl -sf -X POST -H "Authorization: Bearer smoke-token" \
              -H "Content-Type: application/json" -d '{"summary":{"high":1,"medium":0,"low":0}}' \
              http://127.0.0.1:8080/api/v1/ingest/ci-remote/host-hardening-check
          curl -sf http://127.0.0.1:8080/api/v1/summary | python3 -m json.tool | grep -q "ci-remote"
          curl -sf http://127.0.0.1:8080/api/v1/series/ci-remote/host-hardening-check | python3 -m json.tool
          docker rm -f dash

  helm-chart:
    name: Helm chart (lint + kind install test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint and validate manifests
        run: |
          helm lint deploy/helm/devops-dashboard
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          helm template dash deploy/helm/devops-dashboard | /tmp/kubeconform -strict -summary
      - name: Create kind cluster
        run: |
          curl -sSLo /tmp/kind https://kind.sigs.k8s.io/dl/v0.26.0/kind-linux-amd64
          chmod +x /tmp/kind
          /tmp/kind create cluster --wait 120s
      - name: Build and load images
        run: |
          docker build -t devops-dashboard:ci dashboard/
          docker build -t devops-toolkit-collector:ci -f deploy/collector.Dockerfile .
          /tmp/kind load docker-image devops-dashboard:ci devops-toolkit-collector:ci
      - name: Install the chart
        run: helm install dash deploy/helm/devops-dashboard -f deploy/ci/kind-values.yaml --wait --timeout 180s
      - name: Cluster audits itself and reports to the dashboard
        run: |
          kubectl create job --from=cronjob/dashboard-audit audit-now
          kubectl wait --for=condition=complete job/audit-now --timeout=180s
          kubectl port-forward svc/dashboard 8080:8080 &
          sleep 3
          curl -sf http://127.0.0.1:8080/healthz
          curl -sf http://127.0.0.1:8080/api/v1/summary | python3 -m json.tool | grep -q "kind-ci"
          curl -sf http://127.0.0.1:8080/ | grep -q "k8s-resource-auditor"
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods
          kubectl logs -l app.kubernetes.io/name=devops-dashboard --tail=100 || true
          kubectl logs job/audit-now --tail=100 || true

  backup-restore:
    name: db-backup end-to-end (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: ci-password
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Seed a database
        run: |
          createdb -h localhost -U postgres shop
          psql -h localhost -U postgres -d shop -c "
            CREATE TABLE orders (id serial PRIMARY KEY, item text NOT NULL);
            INSERT INTO orders (item) SELECT 'widget-' || g FROM generate_series(1, 1000) g;"
      - name: Backup with full restore check
        run: |
          python3 db-backup-rotate/db-backup.py \
            --engine postgres --database shop --host localhost --user postgres \
            --backup-dir /tmp/backups --verify restore --no-rotate
      - name: Second backup, JSON summary is valid JSON
        run: |
          sleep 1
          python3 db-backup-rotate/db-backup.py \
            --engine postgres --database shop --host localhost --user postgres \
            --backup-dir /tmp/backups --verify restore --no-rotate --json | python3 -m json.tool
      - name: Rotation dry run deletes nothing, tight retention deletes one
        run: |
          test "$(ls /tmp/backups/shop-*.sql.gz | wc -l)" -eq 2
          python3 db-backup-rotate/db-backup.py \
            --engine postgres --database shop --backup-dir /tmp/backups \
            --rotate-only --dry-run --keep-daily 1 --keep-weekly 0 --keep-monthly 0
          test "$(ls /tmp/backups/shop-*.sql.gz | wc -l)" -eq 2
          python3 db-backup-rotate/db-backup.py \
            --engine postgres --database shop --backup-dir /tmp/backups \
            --rotate-only --keep-daily 1 --keep-weekly 0 --keep-monthly 0
          test "$(ls /tmp/backups/shop-*.sql.gz | wc -l)" -eq 1

  smoke:
    name: Dry-run smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker-cleanup dry run
        run: ./docker-cleanup/docker-cleanup.sh --dry-run --all
      - name: docker-cleanup JSON summary is valid JSON
        run: ./docker-cleanup/docker-cleanup.sh --dry-run --json | python3 -m json.tool
      - name: bootstrap dry run
        run: ./dotfiles-bootstrap/bootstrap.sh --dry-run
      - name: log-alert pattern replay
        run: |
          printf 'GET /api HTTP 500 \nOut of memory: killed process 1234\n' > /tmp/sample.log
          python3 log-tailer-alert/log-alert.py --config log-tailer-alert/example.config.json --test /tmp/sample.log
      - name: k8s-audit help
        run: python3 k8s-resource-auditor/k8s-audit.py --help
      - name: host-hardening-check live run on the runner
        run: |
          sudo python3 host-hardening-check/hardening-check.py
          sudo python3 host-hardening-check/hardening-check.py --output json | python3 -m json.tool > /dev/null
          python3 host-hardening-check/hardening-check.py --checks ssh,kernel,patching
      - name: sys-triage live run on the runner
        run: |
          python3 sys-triage/triage.py --interval 1
          python3 sys-triage/triage.py --interval 1 --output json | python3 -m json.tool > /dev/null
      - name: endpoint-watchdog against a local server
        run: |
          python3 -m http.server 8080 --bind 127.0.0.1 &
          sleep 1
          python3 endpoint-watchdog/watchdog.py --url http://127.0.0.1:8080/ --no-state
          python3 endpoint-watchdog/watchdog.py --url http://127.0.0.1:8080/ --no-state --output json | python3 -m json.tool
          echo "--- negative test: a down endpoint must exit non-zero (FAIL below is expected) ---"
          if python3 endpoint-watchdog/watchdog.py --url http://127.0.0.1:9/ --timeout 2 --no-state; then
            echo "BUG: watchdog exited 0 for a down endpoint"; exit 1
          fi
          echo "OK: down endpoint correctly exited non-zero"
