name: Publish images

# Publishes the dashboard and collector images to GHCR:
#   - version tags (v*)  -> :<semver>, always (tagging IS the release act)
#   - pushes to main     -> :latest + :sha-<commit>, but ONLY when the
#     repository variable PUBLISH_IMAGES is set to "true"
#     (Settings -> Secrets and variables -> Actions -> Variables).
#
# Local image builds stay the default workflow everywhere (minikube docs,
# kind CI test); this exists so releases and, optionally, main are pullable.
# The Helm chart's default image tags follow the chart appVersion, so a
# release is: tag vX.Y.Z, let this publish, bump appVersion to match.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || vars.PUBLISH_IMAGES == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Dashboard image metadata
        id: meta_dashboard
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/devops-dashboard
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          push: true
          tags: ${{ steps.meta_dashboard.outputs.tags }}
          labels: ${{ steps.meta_dashboard.outputs.labels }}

      - name: Collector image metadata
        id: meta_collector
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/devops-toolkit-collector
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      - name: Build and push collector image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/collector.Dockerfile
          push: true
          tags: ${{ steps.meta_collector.outputs.tags }}
          labels: ${{ steps.meta_collector.outputs.labels }}
