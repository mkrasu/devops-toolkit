{{- if .Values.audit.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "devops-dashboard.fullname" . }}-audit
  labels:
    {{- include "devops-dashboard.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.audit.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            {{- include "devops-dashboard.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: audit
        spec:
          serviceAccountName: {{ include "devops-dashboard.fullname" . }}-audit
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: k8s-audit
              image: {{ include "devops-dashboard.auditImage" . }}
              imagePullPolicy: {{ .Values.audit.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              # Audit the cluster (in-cluster kubectl uses the ServiceAccount
              # automatically), then POST the report to the dashboard.
              args:
                - |
                  set -eu
                  python3 /toolkit/k8s-resource-auditor/k8s-audit.py \
                      {{- range .Values.audit.extraArgs }}
                      {{ . }} \
                      {{- end }}
                      --output json > /tmp/audit.json
                  curl -fsS -X POST \
                      -H "Authorization: Bearer ${DASHBOARD_TOKEN}" \
                      -H "Content-Type: application/json" \
                      --data-binary @/tmp/audit.json \
                      "http://{{ include "devops-dashboard.fullname" . }}:{{ .Values.service.port }}/api/v1/ingest/${INGEST_HOST}/k8s-resource-auditor" \
                      > /dev/null
                  echo "audit delivered for host ${INGEST_HOST}"
              env:
                - name: INGEST_HOST
                  value: {{ .Values.ingest.host | quote }}
                - name: DASHBOARD_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "devops-dashboard.fullname" . }}-audit
                      key: token
              resources:
                {{- toYaml .Values.audit.resources | nindent 16 }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false   # writes /tmp/audit.json
                capabilities:
                  drop: ["ALL"]
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-dashboard.fullname" . }}-audit
  labels:
    {{- include "devops-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.ingest.token | quote }}
{{- end }}
