apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-dashboard.fullname" . }}
  labels:
    {{- include "devops-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  DASHBOARD_TOKENS: {{ include "devops-dashboard.tokens" . | quote }}
  DASHBOARD_NOTIFY_SLACK: {{ .Values.notify.slackWebhook | quote }}
  DASHBOARD_NOTIFY_WEBHOOK: {{ .Values.notify.genericWebhook | quote }}
